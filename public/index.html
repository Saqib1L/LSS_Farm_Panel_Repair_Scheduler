<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Farm Monitoring System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-shell" id="appShell">

    <header class="site-header">
        <h1 class="site-header__title">Solar Farm Monitoring System</h1>

        <!-- Populated by FarmSummaryView.render(totals) -->
        <div class="site-header__summary" id="farmSummary">
            <div class="summary-pill summary-pill--healthy">
                <span class="summary-pill__dot"></span>
                <span class="summary-pill__label">Healthy</span>
                <span class="summary-pill__value" id="summaryHealthy">190,000</span>
            </div>
            <div class="summary-pill summary-pill--minor">
                <span class="summary-pill__dot"></span>
                <span class="summary-pill__label">Minor</span>
                <span class="summary-pill__value" id="summaryMinor">6,000</span>
            </div>
            <div class="summary-pill summary-pill--moderate">
                <span class="summary-pill__dot"></span>
                <span class="summary-pill__label">Moderate</span>
                <span class="summary-pill__value" id="summaryModerate">3,000</span>
            </div>
            <div class="summary-pill summary-pill--severe">
                <span class="summary-pill__dot"></span>
                <span class="summary-pill__label">Severe</span>
                <span class="summary-pill__value" id="summarySevere">1,000</span>
            </div>
        </div>
    </header>

    <aside class="maintenance-queue">
        <div class="maintenance-queue__header">
            <h2 class="maintenance-queue__title">Maintenance Queue</h2>
            <p class="maintenance-queue__subtitle">Top 30 worst panels</p>
        </div>

        <!-- Populated by MaintenanceQueueView.render(panels) -->
        <div class="maintenance-queue__list" id="maintenanceQueueList">
            <div class="maintenance-item" data-panel-id="18239" tabindex="0" role="button">
                <span class="maintenance-item__rank">#1</span>
                <span class="maintenance-item__id">Panel 18239</span>
                <span class="maintenance-item__efficiency" data-status="severe">41.8%</span>
            </div>
            <div class="maintenance-item" data-panel-id="9732" tabindex="0" role="button">
                <span class="maintenance-item__rank">#2</span>
                <span class="maintenance-item__id">Panel 9732</span>
                <span class="maintenance-item__efficiency" data-status="severe">43.2%</span>
            </div>
            <div class="maintenance-item" data-panel-id="62818" tabindex="0" role="button">
                <span class="maintenance-item__rank">#3</span>
                <span class="maintenance-item__id">Panel 62818</span>
                <span class="maintenance-item__efficiency" data-status="severe">44.5%</span>
            </div>
        </div>
    </aside>

    <!-- ================= MAIN ================= -->
    <main class="main-content">
        <section class="panel-grid-section">
            <!-- Populated by PanelGridView.render(zones), 20x20 -->
            <div class="panel-grid" id="panelGrid">
                <div class="panel-grid__cell" data-row="0" data-col="0" data-zone-id="0-0" data-status="healthy" tabindex="0" role="button" aria-label="Zone 0-0"></div>
                <div class="panel-grid__cell" data-row="0" data-col="1" data-zone-id="0-1" data-status="healthy" tabindex="0" role="button" aria-label="Zone 0-1"></div>
                <div class="panel-grid__cell" data-row="0" data-col="2" data-zone-id="0-2" data-status="minor" tabindex="0" role="button" aria-label="Zone 0-2"></div>
                <div class="panel-grid__cell" data-row="0" data-col="3" data-zone-id="0-3" data-status="moderate" tabindex="0" role="button" aria-label="Zone 0-3"></div>
                <div class="panel-grid__cell" data-row="0" data-col="4" data-zone-id="0-4" data-status="severe" tabindex="0" role="button" aria-label="Zone 0-4"></div>
                <div class="panel-grid__cell" data-row="0" data-col="5" data-zone-id="0-5" data-status="minor" tabindex="0" role="button" aria-label="Zone 0-5"></div>
                <div class="panel-grid__cell" data-row="0" data-col="6" data-zone-id="0-6" data-status="healthy" tabindex="0" role="button" aria-label="Zone 0-6"></div>
                <div class="panel-grid__cell" data-row="0" data-col="7" data-zone-id="0-7" data-status="moderate" tabindex="0" role="button" aria-label="Zone 0-7"></div>
                <div class="panel-grid__cell" data-row="0" data-col="8" data-zone-id="0-8" data-status="severe" tabindex="0" role="button" aria-label="Zone 0-8"></div>
                <div class="panel-grid__cell" data-row="0" data-col="9" data-zone-id="0-9" data-status="minor" tabindex="0" role="button" aria-label="Zone 0-9"></div>
            </div>
        </section>

        <!-- Populated by ZoneStatsView.render(zoneData), streamed as HTML from the backend over SSE -->
        <div class="stats-panel" id="statsPanel">
            <p class="stats-panel__placeholder">Select a zone to view statistics</p>
        </div>
    </main>
</div>

<script>
    const panelGrid = document.getElementById('panelGrid');
    const statsPanel = document.getElementById('statsPanel');
    let zoneStream = null;

    function openZoneStream(zoneId) {
        if (zoneStream) zoneStream.close();
        zoneStream = new EventSource(`http://localhost:3000/clicked/${zoneId}`);
        zoneStream.onmessage = (event) => {
            statsPanel.innerHTML = event.data;
        };
    }

    // Event delegation: one listener covers all 400 cells, and any future
    // cells re-rendered by PanelGridView.render() work without rebinding.
    panelGrid.addEventListener('click', (event) => {
        const cell = event.target.closest('.panel-grid__cell');
        if (!cell) return;
        openZoneStream(cell.dataset.zoneId);
    });

    panelGrid.addEventListener('keydown', (event) => {
        if (event.key !== 'Enter' && event.key !== ' ') return;
        const cell = event.target.closest('.panel-grid__cell');
        if (!cell) return;
        event.preventDefault();
        openZoneStream(cell.dataset.zoneId);
    });

    // Delegated close button lives inside server-streamed HTML, so it must
    // be bound on the stable parent rather than the replaced innerHTML.
    statsPanel.addEventListener('click', (event) => {
        if (!event.target.matches('.stats-panel__close')) return;
        if (zoneStream) zoneStream.close();
        statsPanel.innerHTML = '<p class="stats-panel__placeholder">Select a zone to view statistics</p>';
    });
</script>
</body>
</html>
